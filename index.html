<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sihirli Zarf</title>
    <link rel="stylesheet" href="style.css?v=6">
</head>
<body>

    <!-- Arka Plan Videosu -->
    <video id="bg-video" loop playsinline muted autoplay>
        <source src="video_2026-05-12_21-08-30.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <!-- Arka Plan Müzik Elementi -->
    <audio id="bg-music" loop>
        <source src="muzik-linkiniz.mp3" type="audio/mpeg">
    </audio>

    <div class="center-box">
        <!-- Zarf Kapsayıcısı -->
        <div class="envelope" id="envelope">
            
            <!-- Üst Kapak -->
            <div class="top"></div>
            
            <!-- İçindeki Mektup -->
            <div class="letter">
                <h2>Seni Seviyorum</h2>
                <p>Hayatımdaki en güzel şey sensin. Her gülüşün kalbimi yeniden aşık ediyor. İyi ki varsın sevgilim. Seni isteyip istemeden kirdigim icin ozur dilerim. Seni seviyorum))</p>
            </div>

            <!-- Kalp Butonu ve İçindeki Fotoğraf -->
            <button id="heartBtn">
                <img src="photo_2026-05-12_21-06-17.jpg" alt="Biz">
            </button>
        </div>
    </div>

    <!-- Kelebeklerin uçuşacağı alan -->
    <div class="butterflies" id="butterflyContainer"></div>

    <script src="script.js?v=6"></script>
</body>
</html>
